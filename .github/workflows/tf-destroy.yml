name: 'Terraform Destroy'

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type DESTROY to confirm infrastructure deletion'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: "${{ secrets.AZURE_CLIENT_ID }}"
  ARM_SUBSCRIPTION_ID: "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
  ARM_TENANT_ID: "${{ secrets.AZURE_TENANT_ID }}"
  ARM_USE_OIDC: "true"
  TF_VAR_ssh_public_key: "${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}"
  TF_VAR_my_home_ip: ${{ secrets.MY_HOME_IP }}
jobs:
  terraform-destroy:
    name: 'Terraform Destroy'
    runs-on: ubuntu-latest
    environment: Dev
    defaults:
      run:
        working-directory: terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Validate confirmation
      run: |
        confirm_value="${{ github.event.inputs.confirm_destroy }}"
        confirm_value="$(printf '%s' "$confirm_value" | xargs)"

        if [ "$confirm_value" != "DESTROY" ]; then
          echo "confirm_destroy must be exactly DESTROY"
          exit 1
        fi

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Terraform Init
      run: terraform init

    - name: Terraform Destroy
      run: terraform destroy -auto-approve -input=false
